<!DOCTYPE html>

<html lang="id"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#e61920",
                        "background-light": "#f8f6f6",
                        "background-dark": "#211111",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased overflow-hidden">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto bg-white">
<!-- Header -->
<div class="absolute top-0 left-0 w-full z-20 flex items-center bg-white/90 backdrop-blur-md p-4 justify-between border-b border-slate-200">
<div class="text-slate-900 flex size-10 items-center justify-center cursor-pointer">
<span class="material-symbols-outlined">arrow_back</span>
</div>
<h2 class="text-slate-900 text-lg font-bold leading-tight tracking-tight flex-1 text-center">Peta Pelanggan</h2>
<div class="flex size-10 items-center justify-end">
<button class="flex items-center justify-center text-slate-900">
<span class="material-symbols-outlined">search</span>
</button>
</div>
</div>
<!-- Main Map Area -->
<div class="flex-1 relative">
<div class="absolute inset-0 bg-slate-200" data-alt="Satellite map view of Jakarta city streets" data-location="Jakarta, Indonesia" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBiDso9zuwFI3P9KrqlAxVOBN3ofk80liapLG8HIAj8iOU0XghYQxWk0baxEZEIrTWDmzgadnosd1jEpKAxF8mbuxlABJGTM3SJIOP_CFNsKFjbh3j2XZpk7QtIYA7Phdul0l3zC4sI21kevOGmoR7G7Ixk5aT-araX6kAEtDBWpmWQSBw-QZmeYDok2Mhi_Rn8msqiUliiSGpyvvUFeMKs92d9iDIQmg-HQwcunMJlLULICfJyjjPl7U2PtnKll-IgXVwl8ScpwS4'); background-size: cover; background-position: center;">
<!-- Map Markers (Simulated) -->
<div class="absolute top-1/3 left-1/4">
<div class="relative flex flex-col items-center">
<div class="bg-primary text-white p-1 rounded-full shadow-lg border-2 border-white">
<span class="material-symbols-outlined text-sm">local_shipping</span>
</div>
<div class="w-1 h-3 bg-primary -mt-1"></div>
</div>
</div>
<div class="absolute top-1/2 left-2/3">
<div class="relative flex flex-col items-center scale-110">
<div class="bg-primary text-white p-2 rounded-full shadow-xl border-2 border-white">
<span class="material-symbols-outlined text-base" style="font-variation-settings: 'FILL' 1">location_on</span>
</div>
<div class="w-1 h-3 bg-primary -mt-1"></div>
</div>
</div>
</div>
<!-- Map Controls -->
<div class="absolute right-4 top-24 flex flex-col gap-2 z-10">
<button class="flex size-11 items-center justify-center rounded-xl bg-white shadow-lg text-slate-700">
<span class="material-symbols-outlined">add</span>
</button>
<button class="flex size-11 items-center justify-center rounded-xl bg-white shadow-lg text-slate-700">
<span class="material-symbols-outlined">remove</span>
</button>
<button class="flex size-11 items-center justify-center mt-2 rounded-xl bg-white shadow-lg text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">my_location</span>
</button>
</div>
</div>
<!-- Bottom Sheet Customer Details -->
<div class="relative z-30 bg-white rounded-t-xl shadow-[0_-8px_30px_rgb(0,0,0,0.12)] border-t border-slate-100 px-5 pt-3 pb-6">
<div class="flex justify-center mb-4">
<div class="h-1.5 w-12 rounded-full bg-slate-300"></div>
</div>
<div class="flex items-start justify-between mb-4">
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<span class="bg-primary/10 text-primary text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider">Prioritas</span>
<span class="text-slate-400 text-sm">#JT98210332</span>
</div>
<h3 class="text-slate-900 text-xl font-bold">Andi Wijaya</h3>
<p class="text-slate-500 text-sm mt-1 flex items-start gap-1">
<span class="material-symbols-outlined text-sm mt-0.5 shrink-0">location_on</span>
                        Jl. Kemang Raya No. 12, Mampang Prapatan, Jakarta Selatan
                    </p>
</div>
<div class="flex flex-col items-end gap-2">
<div class="size-12 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">call</span>
</div>
<span class="text-xs font-semibold text-slate-400 uppercase">1.2 km</span>
</div>
</div>
<div class="flex gap-3 mt-6">
<button class="flex-1 flex items-center justify-center h-14 rounded-xl border-2 border-primary/20 bg-primary/5 text-primary font-bold transition-all active:scale-95">
<span class="material-symbols-outlined mr-2">info</span>
                    Detail
                </button>
<button class="flex-[2] flex items-center justify-center h-14 rounded-xl bg-primary text-white font-bold shadow-lg shadow-primary/20 transition-all active:scale-95">
<span class="material-symbols-outlined mr-2">directions</span>
                    Mulai Navigasi
                </button>
</div>
</div>
<!-- Bottom Navigation Bar -->
<div class="flex gap-2 border-t border-slate-100 bg-white px-4 pb-4 pt-2 shrink-0">
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">home</span>
<p class="text-[10px] font-medium leading-normal">Beranda</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">package_2</span>
<p class="text-[10px] font-medium leading-normal">Pesanan</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-primary" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">map</span>
<p class="text-[10px] font-medium leading-normal">Peta</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">history</span>
<p class="text-[10px] font-medium leading-normal">Riwayat</p>
</a>
<a class="flex flex-1 flex-col items-center justify-center gap-1 text-slate-400" href="#">
<span class="material-symbols-outlined">account_circle</span>
<p class="text-[10px] font-medium leading-normal">Profil</p>
</a>
</div>
</div>
</body></html>
